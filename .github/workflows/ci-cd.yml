name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 - Run Frontend Tests
  # ─────────────────────────────────────────────
  test-frontend:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Front/blablabook

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Front/blablabook/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://api:3000
          NEXTAUTH_SECRET: u4D6rA22xNEwO8s09Pfb686z4fw/sjNzeZxG2pBebto=

  # ─────────────────────────────────────────────
  # JOB 2 - Run Backend Tests
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Back/blablabook-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Back/blablabook-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test


      - name: Run unit tests
        run: npm run test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  # ─────────────────────────────────────────────
  # JOB 3 - Deploy to VPS (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "📥 Pulling latest changes..."
            git pull origin main

            echo "🐳 Building and restarting containers..."
            docker compose pull
            docker compose up -d

            echo "🧹 Cleaning up unused Docker resources..."
            docker image prune -f

            echo "✅ Deployment complete!"
          timeout: 300